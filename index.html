        body {

        .gradient-text {
            background: linear-gradient(135deg, #fff 40%, #555 100%);

            height: 1.5em;
            fill: white;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
            animation: moonPulse 4s ease-in-out infinite;
        }

        @keyframes moonPulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5)); }
        }

        /* Utility per il desktop: centraggio e max-width */
        .container-custom {
