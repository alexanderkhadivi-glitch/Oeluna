<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="1000018721.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Portfolio | Creative Developer & Problem Solver</title>
    <style>
        body { 
            background-color: #050505; 
            color: #ffffff; 
            overflow-x: hidden; 
            scroll-behavior: smooth;
        }

        .gradient-text {
            background: linear-gradient(135deg, #fff 30%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-nav {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- LOGO OELUNA CON BAGLIORE --- */
        .logo-wrapper {
            display: flex;
            align-items: center;
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 0.02em;
            cursor: pointer;
        }

        .moon-o {
            height: 1.1em;
            width: auto;
            margin-right: -2px; /* Avvicina la luna alla E per fusione ottica */
            fill: white;
            /* Bagliore costante ma leggero */
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
            animation: moonPulse 4s ease-in-out infinite;
            transition: all 0.3s ease;
        }

        /* Animazione pulsante del bagliore */
        @keyframes moonPulse {
            0%, 100% { filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.2)); }
            50% { filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.6)); }
        }

        .logo-wrapper:hover .moon-o {
            transform: scale(1.05) rotate(-5deg);
            filter: drop-shadow(0 0 18px rgba(255, 255, 255, 0.8));
        }

        /* --- FINE LOGO --- */

        .contact-footer {
            opacity: 0.3;
            transition: opacity 0.5s ease;
        }

        .contact-footer:hover {
            opacity: 1;
        }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 glass-nav px-6 py-4 flex justify-between items-center">
        <div class="logo-wrapper">
            <svg class="moon-o" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1Z"/>
            </svg>
            <span class="gradient-text">ELUNA</span>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col justify-center px-6 pt-20">
        <div class="space-y-6">
            <span class="text-[10px] uppercase tracking-[0.4em] text-gray-500 font-bold block">Design • Code • Strategy</span>
            
            <h1 class="text-5xl sm:text-7xl font-semibold leading-[1.1] gradient-text tracking-tight">
                Soluzioni <br> digitali di <br> alto livello.
            </h1>
            
            <p class="text-gray-400 text-base leading-relaxed max-w-sm">
                Risolvo problemi complessi attraverso un design raffinato e un'ingegneria del software impeccabile.
            </p>
            
            <p class="text-gray-500 text-sm animate-bounce mt-10">
                Scorri per scoprire di più ↓
            </p>
        </div>
    </section>

    <section class="min-h-screen flex flex-col justify-center items-center px-6">
        <div class="w-full max-w-sm">
            <a href="https://wa.me/+393923464238" class="block bg-white text-black text-center py-5 font-bold text-sm uppercase tracking-[0.2em] hover:bg-gray-200 transition-all transform hover:scale-105">
               Inizia un Progetto
            </a>
        </div>
    </section>

    <footer class="py-20 px-6 mt-20 border-t border-white/5 contact-footer">
        <div class="flex flex-col space-y-4 items-center text-sm tracking-widest uppercase">
            <a href="tel:+393923464238" class="hover:text-white transition">Tel: +39 392 346 4238</a>
            <a href="mailto:oeluna.graphics@gmail.com" class="hover:text-white transition">e-mail: oeluna.graphics@gmail.com</a>
        </div>
    </footer>

</body>
</html>
